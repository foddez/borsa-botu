name: Kripto Sinyal Botu
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'
    - name: Kütüphaneleri Kur
      run: pip install requests pandas ccxt
    - name: Botu Çalıştır
      run: python bot.py
